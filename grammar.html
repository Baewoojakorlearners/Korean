                                    <li>누구 + 가 <i class="fas fa-arrow-right mx-1 text-slate-400"></i> 누가 (誰)</li>

                        `

                ],
                matching: [

                    { left: "의자 (無尾音)", right: "가" },

                ],
                mc: [

                    { question: "바람(___) 붑니다.", options: ["이", "가", "은", "는"], answer: "이", translation: "刮風了。" },
                    { question: "누(___) 왔습니까?", options: ["가", "이", "구", "는"], answer: "가", translation: "誰來了？(누구+가)" },
                    { question: "가방(___) 무겁습니다.", options: ["이", "가", "은", "는"], answer: "이", translation: "包包很重。" },
                    { question: "시계(___) 비쌉니다.", options: ["이", "가", "은", "를"], answer: "가", translation: "時鐘很貴。" },
                    { question: "제(___) 학생입니다.", options: ["가", "이", "는", "은"], answer: "가", translation: "我是學生。(저+가)" },
                    { question: "동생(___) 잡니다.", options: ["이", "가", "은", "를"], answer: "이", translation: "弟弟在睡覺。" },
                    { question: "사과(___) 맛있습니다.", options: ["이", "가", "에", "를"], answer: "가", translation: "蘋果很好吃。" },
                    { question: "꽃(___) 예쁩니다.", options: ["이", "가", "은", "는"], answer: "이", translation: "花很漂亮。" },
                    { question: "친구(___) 옵니다.", options: ["이", "가", "은", "를"], answer: "가", translation: "朋友來了。" }
                ],
                puzzle: [
                    { sentence: ["비가", "많이", "옵니다."], translation: "雨下得很大。" },
                    { sentence: ["누가", "교실에", "있습니까?"], translation: "誰在教室裡？" },
                    { sentence: ["제가", "도와", "주겠습니다."], translation: "我來幫忙。" },
                    { sentence: ["바람이", "시원하게", "붑니다."], translation: "風吹得很涼爽。" },
                    { sentence: ["사과가", "아주", "맛있습니다."], translation: "蘋果非常好吃。" }
                ],
                typing: [
                    { question: "비(___) 옵니다.", answer: "가", hint: "無尾音", translation: "下雨了。" },
                    { question: "바람(___) 붑니다.", answer: "이", hint: "有尾音", translation: "刮風了。" },
                    { question: "누(___) 왔습니까?", answer: "가", hint: "誰來了？特殊變化", translation: "誰來了？" },
                    { question: "제(___) 합니다.", answer: "가", hint: "我來做。特殊變化", translation: "我來做。" }
                ]
            },
            /* =========================================================
               ⚠️ 日後擴充區 ⚠️
               以下為第 4 課至 40 課的擴充位置。請直接複製上面的格式。
               ========================================================= */
            {
                id: "lesson_4",
                title: "4. 에 있다/없다 (存在/位置)",
                theory: [
                    { title: "文法建置中", content: "<p>本課程內容尚未新增，您可以透過修改原始碼中的 COURSE_DATA 來完成擴充。</p>" }
                ],
                matching: [{ left: "교실", right: "에 있습니다" }],
                mc: [{ question: "방(___) 있습니다.", options: ["에", "이", "가", "은"], answer: "에", translation: "在房間裡。" }],
                puzzle: [{ sentence: ["책상", "위에", "있습니다."], translation: "在書桌上。" }],
                typing: [{ question: "학교(___) 있습니다.", answer: "에", hint: "地點助詞", translation: "在學校裡。" }]
            }
            // 繼續複製貼上 lesson_5, lesson_6... 直到 lesson_40
        ];

        /* =====================================================================
           底層程式邏輯 (負責動態生成 UI 與測驗驗證)
        ===================================================================== */
        let currentLessonId = COURSE_DATA[0].id;
        let currentTab = 'theory';

        let matchState = { lefts: null, rights: null, selectedLeft: null, selectedRight: null, matchedPairs: [] };
        let puzzleState = { currentQ: 0, pieces: [], answer: [] };
        let typingState = { currentQ: 0 };
        let mcState = { currentQ: 0, score: 0 };

        window.onload = () => {
            initLessonSelector();
            renderContent();
        };

        function initLessonSelector() {
            const selector = document.getElementById('lesson-selector');
            selector.innerHTML = COURSE_DATA.map(lesson => 
                `<option value="${lesson.id}">${lesson.title}</option>`
            ).join('');
        }

        function changeLesson(lessonId) {
            currentLessonId = lessonId;
            resetStates();
            renderContent();
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            resetStates();
            renderContent();
        }

        function resetStates() {
            matchState = { lefts: null, rights: null, selectedLeft: null, selectedRight: null, matchedPairs: [] };
            puzzleState = { currentQ: 0, pieces: [], answer: [] };
            typingState = { currentQ: 0 };
            mcState = { currentQ: 0, score: 0 };
        }

        function getCurData() { return COURSE_DATA.find(l => l.id === currentLessonId); }

        function renderContent() {
            const container = document.getElementById('content-area');
            const data = getCurData();
            
            container.innerHTML = '';
            container.className = "bg-white p-6 md:p-8 rounded-b-2xl shadow-sm flex-1 min-h-[500px] fade-in";

            if(currentTab === 'theory') renderTheory(container, data.theory);
            if(currentTab === 'matching') renderMatching(container, data.matching);
            if(currentTab === 'puzzle') renderPuzzle(container, data.puzzle);
            if(currentTab === 'mc') renderMC(container, data.mc);
            if(currentTab === 'typing') renderTyping(container, data.typing);
        }

        // --- 1. 理論 ---
        function renderTheory(container, theoryData) {
            if(!theoryData || theoryData.length===0) return container.innerHTML = "<p class='text-center text-slate-400 mt-10'>內容建置中...</p>";
            let html = `<div class="space-y-8">`;
            theoryData.forEach(item => {
                html += `
                    <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                        <h2 class="text-2xl font-black text-indigo-700 mb-6 border-b-2 border-indigo-50 pb-3"><i class="fas fa-bookmark text-indigo-300 mr-2"></i>${item.title}</h2>
                        <div class="text-slate-700 leading-relaxed text-lg">${item.content}</div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // --- 2. 連線配對 ---
        function renderMatching(container, matchingData) {
            if(!matchingData || matchingData.length===0) return container.innerHTML = "<p class='text-center text-slate-400 mt-10'>內容建置中...</p>";
            
            if(matchState.matchedPairs.length === 0 && !matchState.lefts) {
                let lefts = matchingData.map((d, i) => ({ text: d.left, matchId: i, type: 'left' }));
                let rights = matchingData.map((d, i) => ({ text: d.right, matchId: i, type: 'right' }));
                matchState.lefts = lefts.sort(() => Math.random() - 0.5);
                matchState.rights = rights.sort(() => Math.random() - 0.5);
            }

            if(matchState.matchedPairs.length === matchingData.length) {
                return container.innerHTML = `
                    <div class="text-center py-20 pop">
                        <i class="fas fa-check-circle text-6xl text-emerald-500 mb-4"></i>
                        <h2 class="text-3xl font-black text-slate-800">完美配對！</h2>
                        <p class="text-slate-500 mt-2">您已經掌握了這些規則。</p>
                        <button onclick="resetStates(); renderContent();" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-md">再練習一次</button>
                    </div>`;
            }

            let html = `
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-black text-slate-800">連連看</h2>
                    <p class="text-slate-500 mt-2">點選左側名詞，找出右側正確的助詞或接續。</p>
                </div>
                <div class="flex justify-between gap-4 md:gap-8 max-w-3xl mx-auto">
                    <div class="w-1/2 space-y-3" id="match-left">
                        ${matchState.lefts.map(item => `
                            <button onclick="handleMatchClick(${item.matchId}, 'left', this)" class="match-item w-full p-4 md:p-5 rounded-2xl bg-slate-50 font-bold text-lg text-slate-700 shadow-sm ${matchState.matchedPairs.includes(item.matchId) ? 'matched' : ''}">${item.text}</button>
                        `).join('')}
                    </div>
                    <div class="w-1/2 space-y-3" id="match-right">
                        ${matchState.rights.map(item => `
                            <button onclick="handleMatchClick(${item.matchId}, 'right', this)" class="match-item w-full p-4 md:p-5 rounded-2xl bg-slate-50 font-bold text-lg text-slate-700 korean-font shadow-sm ${matchState.matchedPairs.includes(item.matchId) ? 'matched' : ''}">${item.text}</button>
                        `).join('')}
                    </div>
                </div>`;
            container.innerHTML = html;
        }

        window.handleMatchClick = function(matchId, type, btnElement) {
            if(btnElement.classList.contains('matched')) return;
            document.querySelectorAll(`#match-${type} .match-item`).forEach(b => b.classList.remove('selected', 'error'));
            btnElement.classList.add('selected');

            if(type === 'left') matchState.selectedLeft = { id: matchId, element: btnElement };
            if(type === 'right') matchState.selectedRight = { id: matchId, element: btnElement };

            if(matchState.selectedLeft && matchState.selectedRight) {
                if(matchState.selectedLeft.id === matchState.selectedRight.id) {
                    matchState.matchedPairs.push(matchId);
                    showToast("✅ 配對成功！");
                    matchState.selectedLeft = null; matchState.selectedRight = null;
                    setTimeout(renderContent, 300);
                } else {
                    matchState.selectedLeft.element.classList.add('error', 'shake');
                    matchState.selectedRight.element.classList.add('error', 'shake');
                    setTimeout(() => {
                        if(matchState.selectedLeft) matchState.selectedLeft.element.classList.remove('selected', 'error', 'shake');
                        if(matchState.selectedRight) matchState.selectedRight.element.classList.remove('selected', 'error', 'shake');
                        matchState.selectedLeft = null; matchState.selectedRight = null;
                    }, 500);
                }
            }
        };

        // --- 3. 選擇題 (MC) ---
        function renderMC(container, mcData) {
            if(!mcData || mcData.length===0) return container.innerHTML = "<p class='text-center text-slate-400 mt-10'>內容建置中...</p>";
            
            let qIndex = mcState.currentQ;
            if(qIndex >= mcData.length) {
                let perfect = mcState.score === mcData.length;
                return container.innerHTML = `
                    <div class="text-center py-20 pop">
                        <i class="fas ${perfect ? 'fa-trophy text-amber-400' : 'fa-check-circle text-indigo-500'} text-7xl mb-6"></i>
                        <h2 class="text-4xl font-black text-slate-800 mb-2">測驗完成！</h2>
                        <p class="text-xl text-slate-600 font-bold mb-8">得分: <span class="${perfect ? 'text-emerald-500' : 'text-indigo-600'}">${mcState.score} / ${mcData.length}</span></p>
                        <button onclick="resetStates(); renderContent();" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg">重新測驗</button>
                    </div>`;
            }

            let q = mcData[qIndex];
            
            // 進度條
            let progressHtml = `
                <div class="w-full bg-slate-100 rounded-full h-2 mb-8">
                    <div class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: ${(qIndex/mcData.length)*100}%"></div>
                </div>
            `;

            container.innerHTML = `
                ${progressHtml}
                <div class="max-w-2xl mx-auto animate-fade-in">
                    <div class="text-center mb-10">
                        <span class="inline-block bg-indigo-100 text-indigo-700 font-black text-xs uppercase tracking-widest px-3 py-1 rounded-full mb-4">Question ${qIndex+1} of ${mcData.length}</span>
                        <h3 class="text-3xl md:text-4xl font-black korean-font mb-4 text-slate-800 leading-snug">${q.question.replace('___', '_____')}</h3>
                        <p class="text-slate-500 text-sm font-medium"><i class="fas fa-language mr-1"></i> ${q.translation}</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="mc-options">
                        ${q.options.map(opt => `
                            <button onclick="handleMCClick(this, '${opt}', '${q.answer}')" class="bg-white border-2 border-slate-200 p-5 rounded-2xl font-bold korean-font text-xl hover:border-indigo-400 hover:shadow-md transition-all active:scale-95 text-slate-700">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="mc-feedback" class="mt-8 text-center h-12 flex justify-center items-center"></div>
                </div>
            `;
        }

        window.handleMCClick = function(btn, selected, correct) {
            const parent = document.getElementById(`mc-options`);
            const feedback = document.getElementById(`mc-feedback`);
            
            parent.querySelectorAll('button').forEach(b => b.disabled = true);

            if(selected === correct) {
                btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600', 'pop');
                btn.classList.remove('bg-white', 'text-slate-700');
                mcState.score++;
                feedback.innerHTML = `<span class="text-emerald-600 font-bold text-lg"><i class="fas fa-check-circle mr-1"></i> 答對了！</span>`;
                setTimeout(() => { mcState.currentQ++; renderContent(); }, 1000);
            } else {
                btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-600', 'shake');
                parent.querySelectorAll('button').forEach(b => {
                    if(b.innerText.trim() === correct) b.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                });
                feedback.innerHTML = `<span class="text-rose-500 font-bold text-lg"><i class="fas fa-times-circle mr-1"></i> 答錯了</span>`;
                setTimeout(() => { mcState.currentQ++; renderContent(); }, 2000);
            }
        }

        // --- 4. 句子重組 (Puzzle) ---
        function renderPuzzle(container, puzzleData) {
            if(!puzzleData || puzzleData.length===0) return container.innerHTML = "<p class='text-center text-slate-400 mt-10'>內容建置中...</p>";
            
            let qIndex = puzzleState.currentQ;
            if(qIndex >= puzzleData.length) {
                return container.innerHTML = `
                    <div class="text-center py-20 pop">
                        <i class="fas fa-puzzle-piece text-6xl text-indigo-500 mb-4"></i>
                        <h2 class="text-3xl font-black text-slate-800">句子重組完成！</h2>
                        <button onclick="resetStates(); renderContent();" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-md">再練習一次</button>
                    </div>`;
            }

            let currentItem = puzzleData[qIndex];
            
            if(puzzleState.pieces.length === 0 && puzzleState.answer.length === 0) {
                puzzleState.pieces = [...currentItem.sentence].sort(() => Math.random() - 0.5);
            }

            container.innerHTML = `
                <div class="max-w-2xl mx-auto animate-fade-in">
                    <div class="text-center mb-8">
                        <span class="text-xs font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">Question ${qIndex+1} / ${puzzleData.length}</span>
                        <h2 class="text-2xl font-black mt-6 text-slate-800">請重組句子</h2>
                        <p class="text-slate-500 mt-2 font-medium"><i class="fas fa-language"></i> 目標：${currentItem.translation}</p>
                    </div>

                    <div class="min-h-[100px] bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl p-5 flex flex-wrap gap-3 items-center justify-center mb-8 transition-colors" id="puzzle-answer-box">
                        ${puzzleState.answer.length === 0 ? '<span class="text-slate-400 font-bold">點擊下方單字放入此處</span>' : 
                          puzzleState.answer.map((word, i) => `
                            <div onclick="puzzleRemove(${i})" class="puzzle-piece bg-indigo-600 text-white korean-font font-bold text-lg px-5 py-3 rounded-xl shadow-md flex items-center gap-2">
                                ${word} <i class="fas fa-times text-xs opacity-50"></i>
                            </div>
                          `).join('')}
                    </div>

                    <div class="flex flex-wrap gap-3 justify-center" id="puzzle-pieces-box">
                        ${puzzleState.pieces.map((word, i) => `
                            <button onclick="puzzleAdd(${i})" class="puzzle-piece bg-white border-2 border-slate-200 text-slate-700 korean-font font-bold text-lg px-5 py-3 rounded-xl shadow-sm hover:border-indigo-400 hover:text-indigo-600">
                                ${word}
                            </button>
                        `).join('')}
                    </div>
                    
                    <div class="mt-12 flex justify-center gap-4 border-t border-slate-100 pt-6">
                        <button onclick="puzzleResetCurrent()" class="text-slate-500 font-bold hover:text-rose-500 px-6 py-3 rounded-xl bg-slate-100 hover:bg-rose-50 transition"><i class="fas fa-undo mr-1"></i> 重置</button>
                        <button onclick="puzzleSubmit()" class="bg-slate-800 text-white font-bold px-10 py-3 rounded-xl hover:bg-black shadow-lg transition">提交答案</button>
                    </div>
                </div>
            `;
        }

        window.puzzleAdd = function(index) {
            let word = puzzleState.pieces.splice(index, 1)[0];
            puzzleState.answer.push(word);
            renderContent();
        };

        window.puzzleRemove = function(index) {
            let word = puzzleState.answer.splice(index, 1)[0];
            puzzleState.pieces.push(word);
            renderContent();
        };

        window.puzzleResetCurrent = function() {
            puzzleState.pieces = [...puzzleState.pieces, ...puzzleState.answer].sort(() => Math.random() - 0.5);
            puzzleState.answer = [];
            renderContent();
        };

        window.puzzleSubmit = function() {
            const data = getCurData().puzzle;
            const correctArr = data[puzzleState.currentQ].sentence;
            const answerBox = document.getElementById('puzzle-answer-box');
            
            if(puzzleState.answer.join('') === correctArr.join('')) {
                showToast("✅ 句子完全正確！");
                answerBox.classList.add('bg-emerald-100', 'border-emerald-500');
                setTimeout(() => {
                    puzzleState.currentQ++;
                    puzzleState.pieces = [];
                    puzzleState.answer = [];
                    renderContent();
                }, 1000);
            } else {
                answerBox.classList.add('shake', 'border-rose-400', 'bg-rose-50');
                showToast("❌ 順序似乎不對喔");
                setTimeout(() => {
                    answerBox.classList.remove('shake', 'border-rose-400', 'bg-rose-50');
                }, 500);
            }
        };

        // --- 5. 填空輸入題 (Typing) ---
        function renderTyping(container, typingData) {
            if(!typingData || typingData.length===0) return container.innerHTML = "<p class='text-center text-slate-400 mt-10'>內容建置中...</p>";
            let qIndex = typingState.currentQ;
            
            if(qIndex >= typingData.length) {
                return container.innerHTML = `
                    <div class="text-center py-20 pop">
                        <i class="fas fa-keyboard text-6xl text-indigo-500 mb-4"></i>
                        <h2 class="text-3xl font-black text-slate-800">輸入測驗完成！</h2>
                        <p class="text-slate-500 mt-2">太棒了，您的拼寫記憶越來越穩固了。</p>
                        <button onclick="resetStates(); renderContent();" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-md">再測一次</button>
                    </div>`;
            }

            let q = typingData[qIndex];
            let parts = q.question.split('___');

            container.innerHTML = `
                <div class="max-w-xl mx-auto py-8 animate-fade-in flex flex-col items-center">
                    <div class="text-center mb-10 w-full">
                        <span class="text-xs font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full mb-4 inline-block">Question ${qIndex+1} / ${typingData.length}</span>
                        <p class="text-slate-500 mt-2 font-medium"><i class="fas fa-language text-slate-400"></i> ${q.translation}</p>
                        ${q.hint ? `<p class="text-amber-600 text-sm mt-3 bg-amber-50 inline-block px-4 py-2 rounded-xl font-bold border border-amber-100"><i class="fas fa-lightbulb text-amber-400"></i> 提示: ${q.hint}</p>` : ''}
                    </div>
                    
                    <div class="text-3xl md:text-4xl font-black korean-font text-center text-slate-800 leading-loose mb-10 flex flex-wrap items-center justify-center gap-3">
                        <span>${parts[0]}</span>
                        <input type="text" id="type-input" autocomplete="off" autocorrect="off" spellcheck="false" class="w-32 border-b-4 border-slate-300 bg-slate-50 text-indigo-600 text-center focus:outline-none focus:border-indigo-500 focus:bg-indigo-50 transition-colors px-2 py-2 rounded-t-xl shadow-inner">
                        <span>${parts[1] || ''}</span>
                    </div>

                    <div id="type-feedback" class="text-center h-10 font-bold mb-6 w-full flex items-center justify-center"></div>

                    <button onclick="checkTyping('${q.answer}')" id="btn-type-submit" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl hover:bg-black active:scale-95 transition-all shadow-lg tracking-widest uppercase">
                        提交答案 (Enter)
                    </button>
                </div>
            `;

            setTimeout(() => {
                const input = document.getElementById('type-input');
                if(input) {
                    input.focus();
                    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkTyping(q.answer); });
                }
            }, 100);
        }

        window.checkTyping = function(correctAnswer) {
            const input = document.getElementById('type-input');
            const feedback = document.getElementById('type-feedback');
            const val = input.value.trim();

            if(!val) {
                input.classList.add('border-amber-300', 'animate-shake');
                setTimeout(()=> input.classList.remove('animate-shake'), 400);
                return;
            }

            if(val === correctAnswer) {
                input.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                input.classList.remove('border-slate-300');
                feedback.innerHTML = `<span class="text-emerald-600 pop inline-block text-lg"><i class="fas fa-check-circle"></i> 正確無誤！</span>`;
                input.disabled = true;
                document.getElementById('btn-type-submit').disabled = true;
                
                setTimeout(() => {
                    typingState.currentQ++;
                    renderContent();
                }, 1000);
            } else {
                input.classList.add('border-rose-500', 'bg-rose-50', 'text-rose-600', 'shake');
                feedback.innerHTML = `<span class="text-rose-500 text-lg"><i class="fas fa-times-circle"></i> 拼錯了，請檢查您的輸入。</span>`;
                setTimeout(() => {
                    input.classList.remove('shake');
                    input.select();
                }, 400);
            }
        }

        // 共用工具
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            if(window.toastTimer) clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
