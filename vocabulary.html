<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK 核心單字全方位學習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
        }

        body { 
            font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc;
        }

        .korean-font { font-family: 'Noto Sans KR', sans-serif; }

        /* 卡片翻轉動畫 */
        .perspective-1000 { perspective: 1000px; }
        .inner-card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .inner-card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 2rem;
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }

        .active-tab { 
            background-color: white; 
            color: var(--primary); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- 導航欄 -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <!-- 點擊標題連到指定的外部主頁 -->
            <a href="https://baewoojakorlearners.github.io/Korean/" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition group" title="回到網站主頁">
                <div class="bg-white/20 p-2 rounded-lg group-hover:bg-white/30 transition">
                    <i class="fas fa-home text-xl"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">韓文單字大師</h1>
            </a>
            <div id="sync-status" class="text-xs bg-indigo-800 px-3 py-1 rounded-full flex items-center gap-2">
                <i class="fas fa-database"></i> <span>等待同步...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6 pb-24">
        
        <!-- 控制面板 -->
        <section id="control-panel" class="mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 級別切換 -->
                <div class="bg-white p-2 rounded-2xl shadow-sm flex border border-slate-100">
                    <button onclick="changeLevel('beginner')" id="btn-beginner" class="flex-1 py-3 rounded-xl font-bold transition-all active-tab">初級 (TOPIK I)</button>
                    <button onclick="changeLevel('intermediate')" id="btn-intermediate" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-400">中級 (TOPIK II)</button>
                </div>
                <!-- 雲端同步 (已移除手動上傳) -->
                <div class="flex">
                    <button onclick="syncData()" class="flex-1 bg-slate-800 text-white py-3 rounded-2xl font-bold hover:bg-black transition flex items-center justify-center gap-2 shadow-md">
                        <i class="fab fa-github"></i> 更新單字庫
                    </button>
                </div>
            </div>
        </section>

        <!-- 進度條 -->
        <div id="progress-container" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-8">
            <div class="flex justify-between items-end mb-2">
                <div class="flex flex-col">
                    <span id="current-level-label" class="text-xs font-black text-indigo-500 uppercase tracking-widest">當前級別：初級</span>
                    <span id="current-mode-label" class="text-lg font-bold text-slate-700">學習總覽</span>
                </div>
                <span id="progress-percent" class="text-3xl font-black text-indigo-600 italic">0%</span>
            </div>
            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-400 to-indigo-600 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
            <div class="mt-2 text-right text-xs text-slate-400 font-bold" id="progress-stats">0 / 0 單字</div>
        </div>

        <!-- 主視窗容器 -->
        <div id="main-view" class="bg-white rounded-[2.5rem] shadow-xl p-6 min-h-[550px] flex flex-col items-center justify-center relative border border-slate-50 overflow-hidden">
            <!-- 初始載入畫面 -->
            <div class="text-center opacity-30">
                <i class="fas fa-cloud-download-alt text-7xl mb-4"></i>
                <p class="text-xl font-bold">尚未同步資料</p>
                <p>請點擊更新單字庫從雲端獲取單字</p>
            </div>
        </div>

    </main>

    <!-- 底部導覽 -->
    <div id="mobile-nav" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md border border-white/20 shadow-2xl rounded-full px-6 py-3 flex gap-6 z-50 transition-transform duration-300">
        <button onclick="setMode('index')" class="text-slate-400 hover:text-indigo-600 transition flex flex-col items-center gap-1">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold">總覽</span>
        </button>
        <button onclick="setMode('list')" class="text-slate-400 hover:text-indigo-600 transition flex flex-col items-center gap-1">
            <i class="fas fa-list text-xl"></i>
            <span class="text-[10px] font-bold">清單</span>
        </button>
        <button onclick="setMode('flashcard')" class="text-slate-400 hover:text-indigo-600 transition flex flex-col items-center gap-1">
            <i class="fas fa-clone text-xl"></i>
            <span class="text-[10px] font-bold">字卡</span>
        </button>
        <button onclick="setMode('quiz')" class="text-slate-400 hover:text-indigo-600 transition flex flex-col items-center gap-1">
            <i class="fas fa-tasks text-xl"></i>
            <span class="text-[10px] font-bold">測驗</span>
        </button>
        <button onclick="setMode('spell')" class="text-slate-400 hover:text-indigo-600 transition flex flex-col items-center gap-1">
            <i class="fas fa-keyboard text-xl"></i>
            <span class="text-[10px] font-bold">拼寫</span>
        </button>
    </div>

    <!-- 吐司消息 -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100] font-bold"></div>

    <script>
        // 設定 GitHub 連結 (請更換為您的 CSV 原始碼連結)
        const GITHUB_CSV_URLS = {
            beginner: "https://raw.githubusercontent.com/Baewoojakorlearners/Korean/refs/heads/main/Vocab%20-%20%E1%84%8E%E1%85%A9%E1%84%80%E1%85%B3%E1%86%B8(1%2C847)%20(4).csv",
            intermediate: "https://raw.githubusercontent.com/Baewoojakorlearners/Korean/refs/heads/main/Vocab%20-%20%E1%84%8C%E1%85%AE%E1%86%BC%E1%84%80%E1%85%B3%E1%86%B8(3%2C873).csv"
        };

        let state = {
            currentLevel: 'beginner',
            currentMode: 'index',
            data: { beginner: [], intermediate: [] },
            progress: { beginner: 0, intermediate: 0 }
        };

        window.onload = () => {
            const saved = localStorage.getItem('baewooja_master_v3');
            if (saved) {
                state = JSON.parse(saved);
                updateUI();
                renderView();
            }
        };

        function saveState() {
            localStorage.setItem('baewooja_master_v3', JSON.stringify(state));
            updateUI();
        }

        // --- 資料處理 ---
        async function syncData() {
            updateSyncStatus('syncing', '正在同步雲端...');
            try {
                const [begRes, intRes] = await Promise.all([
                    fetch(GITHUB_CSV_URLS.beginner).then(r => r.text()),
                    fetch(GITHUB_CSV_URLS.intermediate).then(r => r.text())
                ]);
                state.data.beginner = parseCSV(begRes);
                state.data.intermediate = parseCSV(intRes);
                saveState();
                showToast("雲端同步成功！");
                updateSyncStatus('success', '資料已同步');
                renderView();
            } catch (err) {
                updateSyncStatus('error', '同步失敗');
                showToast("同步失敗，請檢查 URL 是否正確");
            }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            for(let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if(!line) continue;
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                if(cols.length >= 5) {
                    result.push({
                        level: cols[0],
                        ko: cols[1].replace(/\d+$/, ''), // 自動過濾單字結尾數字
                        raw_ko: cols[1],
                        guide: (cols[2] === '-' || !cols[2]) ? '' : cols[2],
                        pos: cols[3],
                        zh: cols[4]
                    });
                }
            }
            return result;
        }

        // --- 介面導航 ---
        function setMode(mode) {
            state.currentMode = mode;
            const modes = {
                'index': '學習總覽',
                'list': '單字清單',
                'flashcard': '記憶字卡',
                'quiz': '選擇測驗',
                'spell': '拼寫練習'
            };
            document.getElementById('current-mode-label').innerText = modes[mode];
            renderView();
        }

        function changeLevel(lv) {
            state.currentLevel = lv;
            document.getElementById('btn-beginner').className = lv === 'beginner' ? 'flex-1 py-3 rounded-xl font-bold transition-all active-tab' : 'flex-1 py-3 rounded-xl font-bold transition-all text-slate-400';
            document.getElementById('btn-intermediate').className = lv === 'intermediate' ? 'flex-1 py-3 rounded-xl font-bold transition-all active-tab' : 'flex-1 py-3 rounded-xl font-bold transition-all text-slate-400';
            document.getElementById('current-level-label').innerText = `當前級別：${lv === 'beginner' ? '初級' : '中級'}`;
            updateUI();
            renderView();
        }

        function updateUI() {
            const currentList = state.data[state.currentLevel];
            const currentProgress = state.progress[state.currentLevel];
            const total = currentList.length;
            const percent = total > 0 ? Math.round((currentProgress / total) * 100) : 0;
            
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-stats').innerText = `${currentProgress} / ${total} 單字`;
        }

        // --- 渲染視圖 ---
        function renderView() {
            const container = document.getElementById('main-view');
            const words = state.data[state.currentLevel];
            
            if (words.length === 0) {
                container.innerHTML = `<div class="text-center animate-fade-in opacity-30"><i class="fas fa-cloud-download-alt text-6xl mb-4"></i><p class="font-bold">尚未同步資料</p></div>`;
                return;
            }

            switch(state.currentMode) {
                case 'index': renderIndex(container, words); break;
                case 'list': renderList(container, words); break;
                case 'flashcard': renderFlashcard(container, words); break;
                case 'quiz': renderQuiz(container, words); break;
                case 'spell': renderSpell(container, words); break;
            }
        }

        // 主頁渲染
        function renderIndex(container, words) {
            const levelText = state.currentLevel === 'beginner' ? '初級 (TOPIK I)' : '中級 (TOPIK II)';
            container.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center p-4 text-center animate-fade-in">
                    <div class="mb-10">
                        <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ring-4 ring-white">
                            <i class="fas fa-rocket text-4xl text-indigo-600"></i>
                        </div>
                        <h2 class="text-3xl md:text-4xl font-black text-slate-800 mb-3">${levelText}</h2>
                        <p class="text-slate-400 font-medium">點擊下方按鈕開始學習</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-2xl">
                        <button onclick="setMode('list')" class="p-6 bg-slate-50 hover:bg-white border-2 border-slate-100 hover:border-indigo-300 rounded-[2rem] transition-all group shadow-sm hover:shadow-md text-left flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-indigo-100 flex items-center justify-center text-indigo-600 group-hover:scale-110 transition"><i class="fas fa-list"></i></div>
                            <div><h3 class="font-black text-slate-800">瀏覽清單</h3><p class="text-xs text-slate-400">查看所有單字與發音</p></div>
                        </button>
                        <button onclick="setMode('flashcard')" class="p-6 bg-slate-50 hover:bg-white border-2 border-slate-100 hover:border-emerald-300 rounded-[2rem] transition-all group shadow-sm hover:shadow-md text-left flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-emerald-100 flex items-center justify-center text-emerald-600 group-hover:scale-110 transition"><i class="fas fa-clone"></i></div>
                            <div><h3 class="font-black text-slate-800">記憶字卡</h3><p class="text-xs text-slate-400">翻轉卡片強化記憶</p></div>
                        </button>
                        <button onclick="setMode('quiz')" class="p-6 bg-slate-50 hover:bg-white border-2 border-slate-100 hover:border-amber-300 rounded-[2rem] transition-all group shadow-sm hover:shadow-md text-left flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-amber-100 flex items-center justify-center text-amber-600 group-hover:scale-110 transition"><i class="fas fa-tasks"></i></div>
                            <div><h3 class="font-black text-slate-800">選擇測驗</h3><p class="text-xs text-slate-400">測試你的翻譯反應力</p></div>
                        </button>
                        <button onclick="setMode('spell')" class="p-6 bg-slate-50 hover:bg-white border-2 border-slate-100 hover:border-rose-300 rounded-[2rem] transition-all group shadow-sm hover:shadow-md text-left flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-rose-100 flex items-center justify-center text-rose-600 group-hover:scale-110 transition"><i class="fas fa-keyboard"></i></div>
                            <div><h3 class="font-black text-slate-800">拼寫挑戰</h3><p class="text-xs text-slate-400">實際打字掌握拼音</p></div>
                        </button>
                    </div>
                </div>
            `;
        }

        // 清單渲染
        function renderList(container, words) {
            container.innerHTML = `
                <div class="w-full flex flex-col animate-fade-in h-full">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="setMode('index')" class="text-indigo-600 font-bold flex items-center gap-2 hover:bg-indigo-50 px-4 py-2 rounded-xl transition">
                            <i class="fas fa-arrow-left"></i> 返回總覽
                        </button>
                        <span class="text-slate-400 text-sm font-bold">${words.length} 個單字</span>
                    </div>
                    <div class="space-y-3 overflow-y-auto no-scrollbar pr-2 flex-1 max-h-[500px]">
                        ${words.map((w, i) => `
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-indigo-100 hover:bg-white transition-all shadow-sm">
                                <div class="flex items-center gap-4">
                                    <button onclick="playKo('${w.ko}')" class="w-10 h-10 min-w-[40px] rounded-full bg-white shadow-sm text-indigo-500 hover:bg-indigo-500 hover:text-white transition flex items-center justify-center">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <span class="text-lg font-bold korean-font">${w.ko}</span>
                                            <span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-black whitespace-nowrap">${w.pos}</span>
                                        </div>
                                        <div class="text-sm text-slate-500">${w.zh}</div>
                                    </div>
                                </div>
                                <div class="text-[11px] text-slate-400 italic korean-font text-right max-w-[150px] leading-tight ml-2">${w.guide}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 字卡渲染
        function renderFlashcard(container, words) {
            let idx = state.progress[state.currentLevel];
            if (idx >= words.length) {
                container.innerHTML = `<div class="text-center animate-fade-in"><h2 class="text-4xl font-black text-indigo-600 mb-6">太棒了！</h2><p class="mb-8">你已完成本級別所有單字</p><button onclick="resetProgress()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg">重新學習</button></div>`;
                return;
            }
            const w = words[idx];
            container.innerHTML = `
                <div class="w-full flex flex-col items-center animate-fade-in">
                    <button onclick="setMode('index')" class="self-start mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-indigo-600 transition">
                        <i class="fas fa-chevron-left"></i> 返回總覽
                    </button>
                    <div class="perspective-1000 w-full max-w-sm h-80 mb-10" onclick="toggleFlip()">
                        <div id="flash-inner" class="inner-card">
                            <div class="card-face bg-indigo-600 text-white shadow-2xl">
                                <span class="text-xs font-bold tracking-widest opacity-50 mb-4 uppercase">${w.pos}</span>
                                <h2 class="text-6xl font-black korean-font mb-8">${w.ko}</h2>
                                <p class="text-sm opacity-40"><i class="fas fa-hand-pointer mr-2"></i>點擊翻面查看翻譯</p>
                            </div>
                            <div class="card-face card-back bg-white border-4 border-indigo-50 shadow-2xl text-slate-800">
                                <h3 class="text-4xl font-black text-indigo-600 mb-4">${w.zh}</h3>
                                <div class="w-12 h-1.5 bg-indigo-100 rounded-full mb-6"></div>
                                <p class="text-lg font-medium text-slate-400 korean-font px-8 leading-relaxed">${w.guide || '（無例句提示）'}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 w-full max-w-sm">
                        <button onclick="playKo('${w.ko}')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold hover:bg-slate-200 transition text-slate-600">聽發音</button>
                        <button onclick="nextWord()" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-indigo-700 transition">下一個</button>
                    </div>
                </div>
            `;
            playKo(w.ko);
        }

        // 測驗渲染
        function renderQuiz(container, words) {
            let idx = state.progress[state.currentLevel];
            if (idx >= words.length) return renderFlashcard(container, words);
            const target = words[idx];
            let options = [target];
            while(options.length < 4 && words.length > 4) {
                let rand = words[Math.floor(Math.random() * words.length)];
                if(!options.find(o => o.ko === rand.ko)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            container.innerHTML = `
                <div class="w-full animate-fade-in">
                    <button onclick="setMode('index')" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-indigo-600 transition">
                        <i class="fas fa-chevron-left"></i> 返回總覽
                    </button>
                    <div class="text-center mb-12">
                        <span class="text-indigo-500 font-black text-xs uppercase tracking-widest mb-2 block">選擇正確的中文翻譯</span>
                        <h2 class="text-6xl font-black korean-font text-slate-800">${target.ko}</h2>
                        <p class="text-slate-300 mt-2 font-bold">${target.pos}</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="quiz-options">
                        ${options.map(opt => `
                            <button onclick="checkAnswer('${opt.ko}', '${target.ko}', this)" class="p-6 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] font-bold text-lg hover:border-indigo-500 hover:bg-white hover:shadow-md transition-all text-slate-700">
                                ${opt.zh}
                            </button>
                        `).join('')}
                    </div>
                    <div id="quiz-feedback" class="mt-8 text-center hidden"></div>
                </div>
            `;
        }

        // 拼寫渲染
        function renderSpell(container, words) {
            let idx = state.progress[state.currentLevel];
            if (idx >= words.length) return renderFlashcard(container, words);
            const target = words[idx];

            container.innerHTML = `
                <div class="w-full max-w-md animate-fade-in flex flex-col items-center">
                    <button onclick="setMode('index')" class="self-start mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-indigo-600 transition">
                        <i class="fas fa-chevron-left"></i> 返回總覽
                    </button>
                    <div class="text-center mb-10 w-full">
                        <span class="text-rose-500 font-black text-xs uppercase tracking-widest mb-2 block">聽音拼寫挑戰</span>
                        <h2 class="text-4xl font-black text-slate-800 mb-3">${target.zh}</h2>
                        <p class="text-slate-400 text-sm font-medium korean-font bg-slate-50 py-2 px-4 rounded-xl inline-block">${target.guide || '(無例句提示)'}</p>
                    </div>
                    <div class="w-full space-y-6">
                        <div class="relative">
                            <input type="text" id="spell-input" autofocus autocomplete="off" class="w-full p-6 bg-slate-50 border-2 border-slate-200 rounded-3xl text-center text-3xl font-bold korean-font focus:border-indigo-500 focus:bg-white focus:outline-none transition-all shadow-inner text-slate-700" placeholder="請輸入韓文">
                            <button onclick="playKo('${target.ko}')" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 hover:text-indigo-500 transition">
                                <i class="fas fa-volume-up text-2xl"></i>
                            </button>
                        </div>
                        <div id="spell-feedback" class="h-6 text-center font-bold text-sm"></div>
                        <button onclick="checkSpell('${target.ko}')" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black hover:bg-black transition shadow-xl tracking-widest uppercase">檢查答案</button>
                    </div>
                </div>
            `;

            const input = document.getElementById('spell-input');
            input.focus();
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkSpell(target.ko); });
        }

        // --- 功能組件 ---
        function toggleFlip() {
            document.getElementById('flash-inner').classList.toggle('is-flipped');
        }

        function nextWord() {
            state.progress[state.currentLevel]++;
            saveState();
            renderView();
        }

        function checkAnswer(sel, cor, btn) {
            const btns = document.querySelectorAll('#quiz-options button');
            btns.forEach(b => b.disabled = true);
            const feedback = document.getElementById('quiz-feedback');
            feedback.classList.remove('hidden');
            if(sel === cor) {
                btn.className = "p-6 bg-emerald-500 border-2 border-emerald-500 rounded-[1.5rem] font-bold text-lg text-white shadow-lg scale-105 transition-all";
                feedback.innerHTML = `<button onclick="nextWord()" class="bg-slate-900 text-white px-10 py-3 rounded-2xl font-bold shadow-lg animate-bounce mt-4">正確！下一個單字 <i class="fas fa-arrow-right ml-2"></i></button>`;
                playKo(cor);
            } else {
                btn.className = "p-6 bg-rose-500 border-2 border-rose-500 rounded-[1.5rem] font-bold text-lg text-white shadow-lg animate-shake";
                feedback.innerHTML = `<p class="text-rose-500 font-bold mb-4">答錯了，正確答案是：${cor}</p><button onclick="renderView()" class="text-slate-400 font-bold underline hover:text-slate-600 transition">再試一次</button>`;
            }
        }

        function checkSpell(correct) {
            const input = document.getElementById('spell-input');
            const feedback = document.getElementById('spell-feedback');
            if(!input.value.trim()) return;
            if(input.value.trim() === correct) {
                feedback.className = "h-6 text-center font-bold text-emerald-500";
                feedback.innerText = "完全正確！";
                input.className = "w-full p-6 bg-emerald-50 border-2 border-emerald-500 rounded-3xl text-center text-3xl font-bold korean-font text-emerald-700";
                playKo(correct);
                setTimeout(nextWord, 1000);
            } else {
                feedback.className = "h-6 text-center font-bold text-rose-500";
                feedback.innerText = "拼法不對喔，再試試！";
                input.classList.add('animate-shake');
                setTimeout(() => input.classList.remove('animate-shake'), 400);
            }
        }

        function resetProgress() {
            if(confirm("確定要重置進度並重新開始學習嗎？")) {
                state.progress[state.currentLevel] = 0;
                saveState();
                renderView();
            }
        }

        function playKo(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ko-KR';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function updateSyncStatus(type, text) {
            const el = document.getElementById('sync-status');
            const icon = type === 'syncing' ? 'fa-spinner fa-spin' : (type === 'success' ? 'fa-check-circle text-emerald-400' : 'fa-exclamation-triangle text-rose-400');
            el.innerHTML = `<i class="fas ${icon}"></i> <span>${text}</span>`;
        }
    </script>
</body>
</html>
