<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心單字學習 | Baewooja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .korean-font { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 隱藏捲軸但可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 字卡翻轉動畫 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flashcard-front { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; transform: rotateY(0deg); }
        .flashcard-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }

        /* 標籤按鈕動畫 */
        .tab-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .mode-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-blue-600 transition font-medium">
                <i class="fas fa-arrow-left"></i> 返回學習中心
            </a>
            <div class="font-bold text-lg tracking-wider text-blue-900 korean-font">
                단어 (Vocabulary)
            </div>
            <div class="w-20"></div> </div>
    </nav>

    <main class="flex-1 max-w-4xl mx-auto w-full p-4 md:p-8">
        
        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-4">核心單字庫</h1>
            
            <div class="inline-flex bg-slate-200/60 p-1 rounded-2xl mb-6">
                <button onclick="setLevel('beginner')" id="btn-beginner" class="tab-btn active px-6 py-2 rounded-xl text-sm font-bold text-slate-600 transition-all">
                    初級 (TOPIK I)
                </button>
                <button onclick="setLevel('intermediate')" id="btn-intermediate" class="tab-btn px-6 py-2 rounded-xl text-sm font-bold text-slate-600 transition-all">
                    中級 (TOPIK II)
                </button>
            </div>
            
            <p class="text-slate-500 text-sm">收錄官方 TOPIK 考試必備單字，搭載科學化記憶系統。</p>
        </header>

        <div class="flex border-b border-slate-200 mb-8 overflow-x-auto no-scrollbar">
            <button onclick="setMode('list')" id="mode-list" class="mode-btn active px-4 py-3 text-sm font-medium text-slate-500 whitespace-nowrap transition-all flex items-center gap-2">
                <i class="fas fa-list"></i> 單字列表
            </button>
            <button onclick="setMode('flashcard')" id="mode-flashcard" class="mode-btn px-4 py-3 text-sm font-medium text-slate-500 whitespace-nowrap transition-all flex items-center gap-2">
                <i class="fas fa-clone"></i> 記憶字卡
            </button>
            <button onclick="setMode('mc')" id="mode-mc" class="mode-btn px-4 py-3 text-sm font-medium text-slate-500 whitespace-nowrap transition-all flex items-center gap-2">
                <i class="fas fa-check-square"></i> 選擇測驗
            </button>
            <button onclick="setMode('spelling')" id="mode-spelling" class="mode-btn px-4 py-3 text-sm font-medium text-slate-500 whitespace-nowrap transition-all flex items-center gap-2">
                <i class="fas fa-keyboard"></i> 拼寫特訓
            </button>
        </div>

        <div id="app-container" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-10 min-h-[400px]">
            </div>

    </main>

    <script>
        /* =========================================
           1. 資料庫 (從 CSV 提取的樣本資料)
           ========================================= */
        const vocabData = {
            beginner: [
                { ko: "가게", pos: "명사", guide: "에 가다", zh: "商店", type: "noun" },
                { ko: "가격", pos: "명사", guide: "이 비싸다", zh: "價格", type: "noun" },
                { ko: "가구", pos: "명사", guide: "책상", zh: "家具", type: "noun" },
                { ko: "가깝다", pos: "형용사", guide: "거리가", zh: "近的", type: "adj" },
                { ko: "가끔", pos: "부사", guide: "가끔 보다", zh: "偶爾", type: "adv" },
                { ko: "가늘다", pos: "형용사", guide: "손가락이", zh: "細的", type: "adj" },
                { ko: "가다", pos: "동사", guide: "학교에", zh: "去", type: "verb" },
                { ko: "가득", pos: "부사", guide: "가득 담다", zh: "滿滿地", type: "adv" },
                { ko: "가르치다", pos: "동사", guide: "한국어를", zh: "教", type: "verb" },
                { ko: "가방", pos: "명사", guide: "을 메다", zh: "包包", type: "noun" }
            ],
            intermediate: [
                { ko: "가까이", pos: "부사/명사", guide: "가까이 다가오다", zh: "靠近地/附近", type: "adv" },
                { ko: "가꾸다", pos: "동사", guide: "나무를 가꾸다", zh: "栽種/打扮", type: "verb" },
                { ko: "가난", pos: "명사", guide: "에 찌들다", zh: "貧窮", type: "noun" },
                { ko: "가능", pos: "명사", guide: "주차 가능", zh: "可能", type: "noun" },
                { ko: "가능성", pos: "명사", guide: "이 높다", zh: "可能性", type: "noun" },
                { ko: "가라앉다", pos: "동사", guide: "먼지가", zh: "沉入/平息", type: "verb" },
                { ko: "가로등", pos: "명사", guide: "이 켜지다", zh: "路燈", type: "noun" },
                { ko: "가로막다", pos: "동사", guide: "길을", zh: "阻擋", type: "verb" },
                { ko: "가루", pos: "명사", guide: "로 만들다", zh: "粉末", type: "noun" },
                { ko: "가뭄", pos: "명사", guide: "이 들다", zh: "乾旱", type: "noun" }
            ]
        };

        /* =========================================
           2. 系統狀態管理
           ========================================= */
        let currentLevel = 'beginner'; // 'beginner' 或 'intermediate'
        let currentMode = 'list';      // 'list', 'flashcard', 'mc', 'spelling'
        let currentWordIndex = 0;
        let score = 0;

        // 音效合成器 (TTS)
        function playAudio(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR'; // 設定為韓語
            utterance.rate = 0.85;    // 稍微放慢語速適合學習
            window.speechSynthesis.speak(utterance);
        }

        /* =========================================
           3. UI 切換邏輯
           ========================================= */
        function setLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'bg-blue-600', 'text-white'));
            document.getElementById(`btn-${level}`).classList.add('active');
            
            // 重置進度
            currentWordIndex = 0;
            score = 0;
            renderMode();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            
            // 重置進度
            currentWordIndex = 0;
            score = 0;
            renderMode();
        }

        function renderMode() {
            const container = document.getElementById('app-container');
            container.innerHTML = ''; // 清空內容
            
            const words = vocabData[currentLevel];

            if (currentMode === 'list') renderList(container, words);
            else if (currentMode === 'flashcard') renderFlashcard(container, words);
            else if (currentMode === 'mc') renderMC(container, words);
            else if (currentMode === 'spelling') renderSpelling(container, words);
        }

        /* =========================================
           4. 模組 1：單字列表 (List)
           ========================================= */
        function renderList(container, words) {
            let html = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">全部單字 (${words.length})</h2>
                    <button onclick="playAllWords()" class="text-sm text-blue-600 font-bold bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100 transition"><i class="fas fa-play mr-2"></i>自動播放</button>
                </div>
                <div class="grid grid-cols-1 gap-3">
            `;
            
            words.forEach(word => {
                html += `
                    <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:border-blue-200 hover:shadow-md transition-all group">
                        <div class="flex items-center gap-4">
                            <button onclick="playAudio('${word.ko}')" class="w-10 h-10 rounded-full bg-white text-blue-500 shadow-sm flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-xl font-bold text-slate-900 korean-font">${word.ko}</span>
                                    <span class="text-[10px] font-bold px-2 py-0.5 rounded text-slate-500 bg-slate-200">${word.pos}</span>
                                </div>
                                <div class="text-sm text-slate-400 korean-font mt-1">搭配：${word.guide}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-slate-700">${word.zh}</div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // 自動播放所有單字
        window.playAllWords = async () => {
            const words = vocabData[currentLevel];
            for (let word of words) {
                playAudio(word.ko);
                await new Promise(r => setTimeout(r, 1500)); // 間隔 1.5 秒
            }
        };

        /* =========================================
           5. 模組 2：記憶字卡 (Flashcard)
           ========================================= */
        function renderFlashcard(container, words) {
            const word = words[currentWordIndex];
            
            container.innerHTML = `
                <div class="text-center mb-6">
                    <span class="text-sm font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">字卡 ${currentWordIndex + 1} / ${words.length}</span>
                </div>
                
                <div class="perspective-1000 w-full max-w-sm mx-auto h-72 mb-8 cursor-pointer" onclick="toggleFlashcard()">
                    <div id="flashcard-inner" class="relative w-full h-full transform-style-3d">
                        
                        <div class="flashcard-front bg-blue-600 rounded-3xl p-8 flex flex-col items-center justify-center text-white shadow-xl shadow-blue-200 backface-hidden border border-blue-500">
                            <span class="absolute top-4 right-4 text-blue-300 text-sm"><i class="fas fa-hand-pointer"></i> 點擊翻轉</span>
                            <span class="text-sm font-medium bg-blue-500/50 px-3 py-1 rounded-full mb-4">${word.pos}</span>
                            <h2 class="text-5xl font-bold korean-font mb-6 tracking-wide">${word.ko}</h2>
                            <button onclick="event.stopPropagation(); playAudio('${word.ko}')" class="w-12 h-12 rounded-full bg-white text-blue-600 flex items-center justify-center text-xl hover:scale-110 transition-transform">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                        
                        <div class="flashcard-back bg-white rounded-3xl p-8 flex flex-col items-center justify-center text-slate-800 shadow-xl border-2 border-slate-100 backface-hidden">
                            <h2 class="text-4xl font-bold mb-4">${word.zh}</h2>
                            <div class="w-12 h-1 bg-blue-500 rounded-full mb-4"></div>
                            <p class="text-slate-500 korean-font text-lg text-center">常見搭配：<br><span class="font-bold text-blue-600">${word.guide}</span></p>
                        </div>
                        
                    </div>
                </div>

                <div class="flex justify-center gap-4">
                    <button onclick="prevCard()" class="px-6 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 font-bold text-slate-600 transition"><i class="fas fa-arrow-left mr-2"></i>上一個</button>
                    <button onclick="nextCard()" class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 font-bold text-white shadow-md shadow-blue-200 transition">下一個 <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            `;
            
            // 每次載入新字卡自動發音
            playAudio(word.ko);
        }

        window.toggleFlashcard = () => {
            const card = document.getElementById('flashcard-inner');
            card.classList.toggle('rotate-y-180');
        };

        window.nextCard = () => {
            const words = vocabData[currentLevel];
            if (currentWordIndex < words.length - 1) {
                currentWordIndex++;
                renderFlashcard(document.getElementById('app-container'), words);
            }
        };

        window.prevCard = () => {
            if (currentWordIndex > 0) {
                currentWordIndex--;
                renderFlashcard(document.getElementById('app-container'), vocabData[currentLevel]);
            }
        };

        /* =========================================
           6. 模組 3：選擇題測驗 (MC)
           ========================================= */
        function renderMC(container, words) {
            if (currentWordIndex >= words.length) {
                return container.innerHTML = `
                    <div class="text-center py-10">
                        <div class="text-6xl mb-4">🎉</div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">測驗完成！</h2>
                        <p class="text-slate-500 mb-6">你的得分：${score} / ${words.length}</p>
                        <button onclick="setMode('mc')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">重新測驗</button>
                    </div>
                `;
            }

            const targetWord = words[currentWordIndex];
            
            // 產生 3 個錯誤選項
            let options = [targetWord];
            while (options.length < 4) {
                let randomWord = words[Math.floor(Math.random() * words.length)];
                if (!options.includes(randomWord)) options.push(randomWord);
            }
            // 打亂選項順序
            options.sort(() => Math.random() - 0.5);

            let html = `
                <div class="flex justify-between items-center mb-8">
                    <span class="text-sm font-bold text-slate-500">進度：${currentWordIndex + 1} / ${words.length}</span>
                    <span class="text-sm font-bold text-emerald-500 bg-emerald-50 px-3 py-1 rounded-full"><i class="fas fa-star text-yellow-400"></i> ${score} 分</span>
                </div>
                
                <div class="text-center mb-10">
                    <p class="text-slate-500 font-medium mb-2">請選擇對應的韓文：</p>
                    <h2 class="text-4xl font-bold text-slate-900">${targetWord.zh}</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="mc-options">
            `;

            options.forEach((opt, idx) => {
                html += `
                    <button onclick="checkMC('${opt.ko}', '${targetWord.ko}', this)" class="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl text-xl font-bold text-slate-700 korean-font hover:border-blue-500 hover:bg-blue-50 transition-all">
                        ${opt.ko}
                    </button>
                `;
            });

            html += `
                </div>
                <div id="mc-feedback" class="mt-8 text-center hidden">
                    </div>
            `;
            container.innerHTML = html;
        }

        window.checkMC = (selected, correct, btnElement) => {
            const buttons = document.getElementById('mc-options').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true); // 鎖定點擊
            
            const feedback = document.getElementById('mc-feedback');
            feedback.classList.remove('hidden');

            if (selected === correct) {
                score++;
                btnElement.classList.replace('border-slate-200', 'border-emerald-500');
                btnElement.classList.replace('hover:bg-blue-50', 'bg-emerald-50');
                btnElement.classList.add('text-emerald-700');
                playAudio(correct); // 答對時發音
                feedback.innerHTML = `
                    <p class="text-emerald-600 font-bold text-lg mb-4"><i class="fas fa-check-circle"></i> 答對了！</p>
                    <button onclick="nextMC()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">下一題</button>
                `;
            } else {
                btnElement.classList.replace('border-slate-200', 'border-red-500');
                btnElement.classList.add('bg-red-50', 'text-red-700');
                
                // 標示正確答案
                buttons.forEach(b => {
                    if(b.innerText.trim() === correct) {
                        b.classList.replace('border-slate-200', 'border-emerald-500');
                        b.classList.add('bg-emerald-50');
                    }
                });

                feedback.innerHTML = `
                    <p class="text-red-500 font-bold text-lg mb-4"><i class="fas fa-times-circle"></i> 答錯了，正確答案是：<span class="korean-font">${correct}</span></p>
                    <button onclick="nextMC()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">下一題</button>
                `;
            }
        };

        window.nextMC = () => {
            currentWordIndex++;
            renderMC(document.getElementById('app-container'), vocabData[currentLevel]);
        };

        /* =========================================
           7. 模組 4：拼寫特訓 (Spelling)
           ========================================= */
        function renderSpelling(container, words) {
            if (currentWordIndex >= words.length) {
                return container.innerHTML = `
                    <div class="text-center py-10">
                        <div class="text-6xl mb-4">🏆</div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">拼寫特訓完成！</h2>
                        <p class="text-slate-500 mb-6">正確拼寫：${score} / ${words.length}</p>
                        <button onclick="setMode('spelling')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">重新挑戰</button>
                    </div>
                `;
            }

            const targetWord = words[currentWordIndex];

            container.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <span class="text-sm font-bold text-slate-500">進度：${currentWordIndex + 1} / ${words.length}</span>
                    <span class="text-sm font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">拼寫模式</span>
                </div>
                
                <div class="bg-slate-50 rounded-2xl p-8 text-center mb-8 border border-slate-100">
                    <span class="text-sm font-bold bg-slate-200 text-slate-500 px-3 py-1 rounded-full mb-4 inline-block">${targetWord.pos}</span>
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">${targetWord.zh}</h2>
                    <p class="text-slate-500 korean-font">搭配提示：<span class="text-blue-500 font-medium">${targetWord.guide}</span></p>
                </div>

                <div class="max-w-md mx-auto relative">
                    <input type="text" id="spell-input" autocomplete="off" placeholder="請輸入韓文拼寫..." class="w-full text-center text-2xl korean-font font-bold p-4 bg-white border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all">
                    
                    <div id="spell-feedback" class="mt-6 text-center h-12"></div>

                    <button id="spell-btn" onclick="checkSpelling('${targetWord.ko}')" class="w-full mt-4 bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition shadow-lg">提交答案</button>
                </div>
            `;

            // 自動 Focus 讓使用者可以直接打字
            setTimeout(() => document.getElementById('spell-input').focus(), 100);
            
            // 綁定 Enter 鍵
            document.getElementById('spell-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    if (document.getElementById('spell-btn').innerText === '下一題') {
                        nextSpelling();
                    } else {
                        checkSpelling(targetWord.ko);
                    }
                }
            });
        }

        window.checkSpelling = (correct) => {
            const input = document.getElementById('spell-input');
            const feedback = document.getElementById('spell-feedback');
            const btn = document.getElementById('spell-btn');
            
            const userText = input.value.trim();
            if(!userText) return;

            input.disabled = true;

            if (userText === correct) {
                score++;
                input.classList.replace('border-slate-300', 'border-emerald-500');
                input.classList.add('bg-emerald-50', 'text-emerald-700');
                feedback.innerHTML = `<span class="text-emerald-600 font-bold text-lg"><i class="fas fa-check"></i> 完美！</span>`;
                playAudio(correct);
            } else {
                input.classList.replace('border-slate-300', 'border-red-500');
                input.classList.add('bg-red-50', 'text-red-700', 'line-through');
                feedback.innerHTML = `<span class="text-red-500 font-bold text-lg"><i class="fas fa-times"></i> 正確寫法：<span class="korean-font text-blue-600 ml-2">${correct}</span></span>`;
            }

            btn.innerText = "下一題";
            btn.classList.replace('bg-slate-800', 'bg-blue-600');
            btn.onclick = nextSpelling;
        };

        window.nextSpelling = () => {
            currentWordIndex++;
            renderSpelling(document.getElementById('app-container'), vocabData[currentLevel]);
        };

        // 初始載入渲染
        window.onload = () => {
            renderMode();
        };
    </script>
</body>
</html>
